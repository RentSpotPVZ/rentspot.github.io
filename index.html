<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentSpot</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* HERO BACKGROUND */
.hero {
  background: url('beach.jpg') center/cover no-repeat;
  height: 100vh;
  position: relative;
}

/* DARK OVERLAY */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* BOX */
.box {
  background: rgba(0,0,0,0.7);
  padding: 25px;
  border-radius: 15px;
  text-align: center;
  color: white;
  width: 300px;
}

/* INPUTS */
input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

/* BUTTONS */
.btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 25px;
  margin-top: 10px;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.call { background: #007bff; }
.whatsapp { background: #25D366; }

/* CARS */
.cars {
  background: #eee;
  padding: 40px;
  text-align: center;
}

.car-list {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.car {
  background: white;
  padding: 15px;
  border-radius: 10px;
  width: 200px;
}

.car img {
  width: 100%;
  border-radius: 10px;
}

/* ABOUT + MAP */
.about, .map {
  padding: 40px;
  text-align: center;
  background: white;
}

.map iframe {
  border-radius: 10px;
}
</style>

</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="overlay">
    <div class="box">
      <h2>RENTSPOT</h2>

      <select>
        <option>Manual</option>
        <option>Automatic</option>
      </select>

      <input type="date">
      <input type="date">

      <button class="btn call">Call Now</button>
      <button class="btn whatsapp">Book via WhatsApp</button>
    </div>
  </div>
</div>

<!-- CARS -->
<div class="cars">
  <h2>Choose Your Car</h2>

  <div class="car-list">

    <div class="car">
      <img src="car1.jpg">
      <h3>Small</h3>
      <p>Perfect for city driving</p>
    </div>

    <div class="car">
      <img src="car2.jpg">
      <h3>Medium</h3>
      <p>Comfort & economy</p>
    </div>

    <div class="car">
      <img src="car3.jpg">
      <h3>Large</h3>
      <p>Ideal for families</p>
    </div>

  </div>
</div>

<!-- ABOUT -->
<div class="about">
  <h2>About Us</h2>
  <p>We provide the best car rental service for your holidays. Fast, easy and reliable.</p>
</div>

<!-- MAP -->
<div class="map">
  <h2>Find Us</h2>
  <iframe 
    src="https://www.google.com/maps?q=Crete&output=embed"
    width="100%" 
    height="300" 
    style="border:0;">
  </iframe>
</div>

</body>
</html>
