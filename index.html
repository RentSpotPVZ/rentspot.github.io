<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentSpot</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center center/cover;
  color:white;
  text-align:center;
}

.container {
  padding:40px;
  background: rgba(0,0,0,0.5);
  min-height:100vh;
}

input {
  padding:10px;
  margin:10px;
  border-radius:8px;
  border:none;
}

button {
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.call { background:#007bff; }
.whatsapp { background:#25D366; }

.cars img {
  width:200px;
  margin:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>RentSpot</h1>

  <input type="date" id="pickup"><br>
  <input type="date" id="dropoff"><br>

  <button class="call" onclick="window.location.href='tel:+306942874950'">Call</button>
  <button class="whatsapp" onclick="sendWhatsApp()">WhatsApp</button>

  <div class="cars">
    <img src="https://cdn.pixabay.com/photo/2012/05/29/00/43/car-49278_1280.jpg">
    <img src="https://cdn.pixabay.com/photo/2013/07/13/10/07/car-156044_1280.png">
    <img src="https://cdn.pixabay.com/photo/2012/05/29/00/43/car-49279_1280.jpg">
  </div>
</div>

<script>
function sendWhatsApp(){
  let pickup = document.getElementById("pickup").value;
  let dropoff = document.getElementById("dropoff").value;

  let msg = "Hello, I want a car from " + pickup + " to " + dropoff;
  let url = "https://wa.me/306942874950?text=" + encodeURIComponent(msg);

  window.open(url, "_blank");
}
</script>

</body>
</html>
