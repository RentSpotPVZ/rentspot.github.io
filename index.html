<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentSpot</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* HERO */
.hero {
  background: url('beach.jpg') no-repeat center center/cover;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.box {
  background: rgba(0,0,0,0.75);
  padding: 25px;
  border-radius: 15px;
  width: 260px;
  text-align: center;
  color: white;
}

.box h2 {
  margin-bottom: 15px;
}

.box select,
.box input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: none;
}

/* BUTTONS */
.btn {
  width: 100%;
  padding: 14px;
  border-radius: 25px;
  border: none;
  margin-top: 10px;
  color: white;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
  display: block;
}

.call {
  background: #1e90ff;
}

.whatsapp {
  background: #25D366;
}

.review {
  background: #444;
}

/* CARS */
.section {
  background: #d2c7b8;
  text-align: center;
  padding: 50px 20px;
}

.section h2 {
  margin-bottom: 20px;
}

.cars {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.car {
  background: #eee;
  padding: 15px;
  border-radius: 12px;
  width: 200px;
}

.car img {
  width: 100%;
  border-radius: 10px;
}

/* WHY */
.why {
  text-align: center;
  padding: 40px 20px;
  background: #f5f5f5;
}

.why h2 {
  margin-bottom: 15px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="box">
    <h2>RENTSPOT</h2>

    <select>
      <option>Manual</option>
      <option>Automatic</option>
    </select>

    <input type="date" id="pickup">
    <input type="date" id="return">

    <button class="btn call" onclick="callNow()">Call Now</button>

    <button class="btn whatsapp" onclick="sendWhatsApp()">
      Book via WhatsApp
    </button>

    <button class="btn review" onclick="leaveReview()">
      Leave a Review
    </button>

  </div>
</div>

<!-- CARS -->
<div class="section">
  <h2>Choose Your Car</h2>

  <div class="cars">

    <div class="car">
      <img src="car1.jpg" alt="">
      <h3>Small</h3>
      <p>Perfect for city driving</p>
    </div>

    <div class="car">
      <img src="car2.jpg" alt="">
      <h3>Medium</h3>
      <p>Comfort & economy</p>
    </div>

    <div class="car">
      <img src="car3.jpg" alt="">
      <h3>Large</h3>
      <p>Ideal for families</p>
    </div>

  </div>
</div>

<!-- WHY -->
<div class="why">
  <h2>Why Choose Us</h2>
  <p>
    ✔ No Hidden Fees &nbsp;&nbsp;&nbsp;&nbsp;
    ✔ Free Airport Pickup &nbsp;&nbsp;&nbsp;&nbsp;
    ✔ 24/7 Support
  </p>
</div>

<!-- JS -->
<script>
function callNow() {
  window.location.href = "tel:+306942874950";
}

function sendWhatsApp() {
  let pickup = document.getElementById("pickup").value;
  let ret = document.getElementById("return").value;

  let message = "Hello! I want to book a car.%0A" +
                "Pickup: " + pickup + "%0A" +
                "Return: " + ret;

  window.open("https://wa.me/306942874950?text=" + message, "_blank");
}

function leaveReview() {
  // ΒΑΛΕ ΤΟ PLACE ID ΣΟΥ ΕΔΩ
  window.open("https://search.google.com/local/writereview?placeid=ChIJPLACEID", "_blank");
}
</script>

</body>
</html>
