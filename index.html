<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Car Rental Preveza Airport (PVK) | RentSpot</title>

<meta name="description" content="Car rental in Preveza and Aktion Airport (PVK). Book your car easily via WhatsApp. Pickup from Preveza Airport, hotel or city. Best prices available.">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>
* { box-sizing: border-box; scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* HEADER */
.header {
  background: white;
  padding: 10px 0;
  text-align: center;
}

.logo {
  width: 200px;
  display: block;
  margin: 0 auto;
}

/* HERO */
.hero {
  background: url('beach.jpg') no-repeat center center/cover;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.box {
  background: rgba(0,0,0,0.75);
  padding: 25px;
  border-radius: 15px;
  width: 260px;
  text-align: center;
  color: white;
}

.box input, .box select {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 8px;
  border: none;
  font-size: 14px;
}

.btn {
  width: 100%;
  padding: 14px;
  border-radius: 25px;
  border: none;
  margin-top: 10px;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.call { background: #1e90ff; }
.whatsapp { background: #25D366; }
.review { background: #444; }

/* CARS */
.section {
  background: #d2c7b8;
  text-align: center;
  padding: 60px 20px;
}

.cars {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.car {
  background: #eee;
  padding: 15px;
  border-radius: 12px;
  width: 200px;
}

.car img {
  width: 100%;
  border-radius: 10px;
}

/* MAP */
.map {
  padding: 50px;
  text-align: center;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="logo.png.png" class="logo" alt="RentSpot Logo">
</div>

<!-- HERO -->
<div class="hero">
  <div class="box">
    <h1>RentSpot</h1>

    <select id="carType">
      <option value="Manual">Manual</option>
      <option value="Automatic">Automatic</option>
    </select>

    <select id="carCategory">
      <option value="Small">Small</option>
      <option value="Medium">Medium</option>
      <option value="Large">Large</option>
    </select>

    <input type="text" id="pickup" placeholder="Pickup Date">
    <input type="text" id="return" placeholder="Return Date">

    <button class="btn call" onclick="callNow()">📞 Call Now</button>
    <button class="btn whatsapp" onclick="sendWhatsApp()">💬 Book via WhatsApp</button>
    <button class="btn review" onclick="leaveReview()">⭐ Leave a Review</button>
    <button class="btn" style="background:#ff9800;" onclick="checkAvailability()">🚗 Available Today</button>

    <p style="font-size:13px; margin-top:10px;">
      Car Rental in Preveza & Aktion Airport (PVK)
    </p>
  </div>
</div>

<!-- CARS -->
<div class="section">
  <h2>Choose Your Car</h2>

  <div class="cars">
    <div class="car">
      <img src="car1.jpg">
      <h3>Small</h3>
      <p>Perfect for city driving</p>
    </div>

    <div class="car">
      <img src="car2.jpg">
      <h3>Medium</h3>
      <p>Comfort & economy</p>
    </div>

    <div class="car">
      <img src="car3.jpg">
      <h3>Large</h3>
      <p>Ideal for families</p>
    </div>
  </div>
</div>

<!-- MAP -->
<div class="map">
  <h2>Find Us</h2>

  <p><strong>Address:</strong> Parmenionos 8, Preveza 48100</p>

  <iframe
    src="https://maps.google.com/maps?q=Parmenionos%208%20Preveza%2048100&t=&z=15&ie=UTF8&iwloc=&output=embed"
    width="90%"
    height="300"
    style="border:0; border-radius:10px;">
  </iframe>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>
function callNow() {
  window.location.href = "tel:+306942874950";
}

function sendWhatsApp() {
  let pickup = document.getElementById("pickup").value;
  let ret = document.getElementById("return").value;
  let carType = document.getElementById("carType").value;
  let carCategory = document.getElementById("carCategory").value;

  let message = "🚗 Booking Request%0A%0A" +
                "Category: " + carCategory + "%0A" +
                "Transmission: " + carType + "%0A" +
                "Pickup: " + pickup + "%0A" +
                "Return: " + ret;

  window.open("https://wa.me/306942874950?text=" + message, "_blank");
}

function checkAvailability() {
  window.open("https://wa.me/306942874950?text=Hello! Do you have cars available today?", "_blank");
}

function leaveReview() {
  window.open("https://search.google.com/local/writereview?placeid=ChIJPLACEID", "_blank");
}

flatpickr("#pickup", {
  minDate: "today",
  altInput: true,
  altFormat: "F j, Y"
});

flatpickr("#return", {
  minDate: "today",
  altInput: true,
  altFormat: "F j, Y"
});
</script>

</body>
</html>
