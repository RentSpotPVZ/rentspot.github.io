<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentSpot</title>
</head>

<body>

<h1>RentSpot</h1>

<input type="date" id="pickup"><br><br>
<input type="date" id="dropoff"><br><br>

<button onclick="window.location.href='tel:+306942874950'">Call</button>
<button onclick="sendWhatsApp()">WhatsApp</button>

<script>
function sendWhatsApp(){
  let pickup = document.getElementById("pickup").value;
  let dropoff = document.getElementById("dropoff").value;

  let msg = "Hello from " + pickup + " to " + dropoff;
  let url = "https://wa.me/306942874950?text=" + encodeURIComponent(msg);

  window.open(url, "_blank");
}
</script>

</body>
</html>
